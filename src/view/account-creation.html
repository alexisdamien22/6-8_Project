<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Création de compte</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,800&display=swap" rel="stylesheet">
<style>
  :root {
    --purple: #7B2FBE;
    --purple-hover: #6A1FA8;
    --white: #FFFFFF;
    --gray-input: #EBEBEB;
    --gray-placeholder: #AAAAAA;
    --gray-sub: #999;
    --gray-dark: #1A1A1A;
    --radius-btn: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: #D8D8D8;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Phone shell */
  .phone {
    width: 390px;
    height: 760px;
    background: var(--white);
    border-radius: 40px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.22);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* Back button row */
  .top-bar {
    padding: 28px 24px 0;
    min-height: 56px;
    display: flex;
    align-items: center;
  }
  .btn-back {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 2px solid #DEDEDE;
    background: white;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 18px;
    color: #555;
    transition: border-color 0.2s, color 0.2s;
    line-height: 1;
  }
  .btn-back:hover { border-color: var(--purple); color: var(--purple); }

  /* Scrollable content */
  .content {
    flex: 1;
    padding: 20px 28px 0;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    animation: fadeIn .28s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateX(14px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  /* Title block */
  .page-title {
    font-size: 28px;
    font-weight: 900;
    color: var(--gray-dark);
    letter-spacing: -0.4px;
    line-height: 1.1;
  }
  .step-label {
    font-size: 13px;
    font-weight: 700;
    color: var(--gray-sub);
    margin-top: 4px;
  }

  /* Big illustration */
  .illus-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px 0 8px;
  }
  .illus-wrap svg {
    width: 140px;
    height: 140px;
    fill: var(--purple);
    display: block;
  }
  .illus-name {
    margin-top: 12px;
    font-size: 17px;
    font-weight: 800;
    font-style: italic;
    color: var(--purple);
  }

  /* Form */
  .form-block { margin-bottom: 4px; }
  .q-label {
    font-size: 14px;
    font-weight: 700;
    color: var(--gray-dark);
    margin-bottom: 10px;
    line-height: 1.5;
  }
  .q-label em { font-style: normal; color: var(--purple); }
  .q-hint {
    font-size: 11.5px;
    font-weight: 600;
    color: var(--gray-sub);
    margin-top: 3px;
    display: block;
  }

  input[type="text"],
  input[type="number"],
  input[type="email"],
  input[type="password"] {
    width: 100%;
    padding: 16px 18px;
    background: var(--gray-input);
    border: 2px solid transparent;
    border-radius: 12px;
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--gray-dark);
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  input::placeholder { color: var(--gray-placeholder); }
  input:focus { border-color: var(--purple); background: #faf6ff; }

  /* Instrument grid */
  .instr-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 9px;
  }
  .instr-card {
    background: var(--gray-input);
    border: 2px solid transparent;
    border-radius: 14px;
    padding: 12px 6px 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 7px;
    cursor: pointer;
    transition: all 0.18s;
  }
  .instr-card svg { width: 38px; height: 38px; fill: #BBBBBB; transition: fill 0.18s; }
  .instr-card .lbl { font-size: 11px; font-weight: 800; color: #BBBBBB; transition: color 0.18s; }
  .instr-card:hover, .instr-card.sel {
    background: #F0E6FF;
    border-color: var(--purple);
  }
  .instr-card:hover svg, .instr-card.sel svg { fill: var(--purple); }
  .instr-card:hover .lbl, .instr-card.sel .lbl { color: var(--purple); }

  /* Mascot grid */
  .mascot-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .mascot-cell {
    aspect-ratio: 1;
    background: var(--gray-input);
    border: 2.5px solid transparent;
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
    cursor: pointer;
    transition: all 0.18s;
  }
  .mascot-cell:hover { background: #F0E6FF; border-color: #C084FC; transform: scale(1.04); }
  .mascot-cell.sel { background: #F0E6FF; border-color: var(--purple); transform: scale(1.06); }

  /* Days */
  .days-row {
    display: flex;
    gap: 7px;
    justify-content: space-between;
  }
  .day-pill {
    flex: 1;
    height: 44px;
    border-radius: 50%;
    border: none;
    background: var(--gray-input);
    font-family: 'Nunito', sans-serif;
    font-size: 12px;
    font-weight: 800;
    color: #AAAAAA;
    cursor: pointer;
    transition: all 0.18s;
    display: flex; align-items: center; justify-content: center;
  }
  .day-pill:hover { background: #EDE0FF; color: var(--purple); }
  .day-pill.sel { background: var(--purple); color: white; }

  /* Footer */
  .footer {
    padding: 14px 28px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .btn-next {
    width: 100%;
    padding: 18px;
    background: var(--purple);
    color: white;
    border: none;
    border-radius: var(--radius-btn);
    font-family: 'Nunito', sans-serif;
    font-size: 17px;
    font-weight: 800;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: background 0.2s, transform 0.1s;
  }
  .btn-next:hover { background: var(--purple-hover); }
  .btn-next:active { transform: scale(0.98); }
  .btn-next:disabled {
    background: #DEDEDE;
    color: #AAAAAA;
    cursor: not-allowed;
  }
  .note-deco { color: var(--purple); font-size: 20px; opacity: 0.45; }
  .login-hint { font-size: 12.5px; font-weight: 700; color: #AAAAAA; }
  .login-hint a { color: var(--purple); text-decoration: none; font-weight: 800; }

  /* Success */
  .success-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 28px;
    text-align: center;
  }
  .s-mascot { font-size: 80px; margin-bottom: 16px; }
  .s-title { font-size: 28px; font-weight: 900; color: var(--gray-dark); margin-bottom: 10px; }
  .s-msg { font-size: 15px; font-weight: 600; color: var(--gray-sub); line-height: 1.6; }
</style>
</head>
<body>
<div class="phone" id="phone"></div>

<script>
/* ── SVG paths per instrument ─────────────────────────────────── */
const SVGS = {
  piano:`<svg viewBox="0 0 64 64"><rect x="6" y="18" width="52" height="30" rx="4"/><rect x="6" y="18" width="52" height="18" rx="4" fill="white" fill-opacity=".15"/><rect x="11" y="22" width="6" height="11" rx="2" fill="white"/><rect x="20" y="22" width="6" height="11" rx="2" fill="white"/><rect x="35" y="22" width="6" height="11" rx="2" fill="white"/><rect x="44" y="22" width="6" height="11" rx="2" fill="white"/><rect x="16" y="22" width="4" height="8" rx="1.5"/><rect x="25" y="22" width="4" height="8" rx="1.5"/><rect x="40" y="22" width="4" height="8" rx="1.5"/><rect x="49" y="22" width="4" height="8" rx="1.5"/></svg>`,
  guitare:`<svg viewBox="0 0 64 64"><path d="M29 7h6v20q8 4 8 15a11 11 0 0 1-22 0q0-11 8-15Z"/><rect x="30" y="3" width="4" height="8" rx="2"/><circle cx="32" cy="41" r="4" fill="white" fill-opacity=".25"/></svg>`,
  violon:`<svg viewBox="0 0 64 64"><path d="M32 7c-7 0-11 5-11 11 0 4 2 7 2 11s-4 6-4 12c0 9 6 16 13 16s13-7 13-16c0-6-4-8-4-12s2-7 2-11c0-6-4-11-11-11z"/><path d="M21 23q-4 2-4 6t4 3" fill="white" fill-opacity=".2"/><path d="M43 23q4 2 4 6t-4 3" fill="white" fill-opacity=".2"/></svg>`,
  flute:`<svg viewBox="0 0 64 64"><rect x="7" y="27" width="50" height="10" rx="5" transform="rotate(-28 32 32)"/><circle cx="19" cy="40" r="2.8" fill="white" fill-opacity=".5"/><circle cx="27" cy="36" r="2.8" fill="white" fill-opacity=".5"/><circle cx="35" cy="31" r="2.8" fill="white" fill-opacity=".5"/><circle cx="43" cy="27" r="2.8" fill="white" fill-opacity=".5"/></svg>`,
  batterie:`<svg viewBox="0 0 64 64"><ellipse cx="32" cy="37" rx="20" ry="10"/><ellipse cx="32" cy="30" rx="20" ry="10" fill-opacity=".75"/><ellipse cx="32" cy="30" rx="20" ry="10" fill="none" stroke="white" stroke-opacity=".3" stroke-width="1.5"/><line x1="24" y1="13" x2="28" y2="30" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/><line x1="40" y1="13" x2="36" y2="30" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/></svg>`,
  trompette:`<svg viewBox="0 0 64 64"><path d="M8 27h30q9 0 13 9a10 10 0 0 1 0 8l-5-1a6 6 0 0 0-2-7q-3-4-6-4H8z"/><rect x="6" y="27" width="4" height="5" rx="2"/><circle cx="22" cy="20" r="5" fill="none" stroke="currentColor" stroke-width="3"/><rect x="28" y="19" width="4" height="13" rx="2"/><rect x="34" y="19" width="4" height="13" rx="2"/></svg>`,
  saxophone:`<svg viewBox="0 0 64 64"><path d="M36 8h5v7q13 3 13 18 0 20-18 25-9 3-15-2l4-5q7 4 13-1 9-7 7-17-2-12-9-13h-5z"/><circle cx="39" cy="26" r="2.2" fill="white" fill-opacity=".5"/><circle cx="43" cy="33" r="2.2" fill="white" fill-opacity=".5"/><circle cx="42" cy="40" r="2.2" fill="white" fill-opacity=".5"/><rect x="30" y="6" width="9" height="6" rx="2.5"/></svg>`,
  basse:`<svg viewBox="0 0 64 64"><path d="M27 7h10v20q10 5 10 16a15 15 0 0 1-30 0q0-11 10-16z"/><rect x="29" y="2" width="5" height="9" rx="2.5"/><line x1="28" y1="9" x2="28" y2="28" stroke="white" stroke-width="1.3" stroke-opacity=".45"/><line x1="33" y1="9" x2="33" y2="28" stroke="white" stroke-width="1.3" stroke-opacity=".45"/><line x1="38" y1="9" x2="38" y2="28" stroke="white" stroke-width="1.3" stroke-opacity=".45"/></svg>`,
};

const INSTRUMENTS = [
  {id:'piano',    lbl:'Piano',     svg:SVGS.piano},
  {id:'guitare',  lbl:'Guitare',   svg:SVGS.guitare},
  {id:'violon',   lbl:'Violon',    svg:SVGS.violon},
  {id:'flute',    lbl:'Flûte',     svg:SVGS.flute},
  {id:'batterie', lbl:'Batterie',  svg:SVGS.batterie},
  {id:'trompette',lbl:'Trompette', svg:SVGS.trompette},
  {id:'saxophone',lbl:'Saxophone', svg:SVGS.saxophone},
  {id:'basse',    lbl:'Basse',     svg:SVGS.basse},
];

// Each step has a different decorative illustration (matching the mockup's rotating instrument)
const STEP_ILLUS = {
  1:{svg:SVGS.guitare,   lbl:'Guitare basse'},
  2:{svg:SVGS.flute,     lbl:'Basson'},
  3:{svg:SVGS.violon,    lbl:'Violon'},
  4:{svg:SVGS.batterie,  lbl:'Caisse claire'},
  5:{svg:SVGS.trompette, lbl:'Cor d\'harmonie'},
  6:{svg:SVGS.trompette, lbl:'Trompette'},
  7:{svg:SVGS.flute,     lbl:'Flûte traversière'},
};

const MASCOTTES = ['🦊','🐸','🐱','🐶','🦄','🐼','🐰','🦋','🐺'];
const JOURS     = ['L','Ma','Me','J','V','S','D'];
const TOTAL     = 7;

const state = {prenom:'', age:'', instrument:'', duree:'', ecole:'', mascotte:'', jours:[]};
let step = 1;

/* ── Render ──────────────────────────────────────────────── */
function render() {
  const phone = document.getElementById('phone');
  phone.innerHTML = '';
  if (step === 8) { renderSuccess(phone); return; }

  /* top bar */
  const top = el('div','top-bar');
  if (step > 1) {
    const back = el('button','btn-back');
    back.innerHTML = '&#8592;';
    back.onclick = ()=>go(step-1);
    top.appendChild(back);
  }
  phone.appendChild(top);

  /* content */
  const cont = el('div','content');
  const illus = STEP_ILLUS[step];

  cont.innerHTML = `
    <div class="page-title">Création de compte</div>
    <div class="step-label">${step}/${TOTAL}</div>
    <div class="illus-wrap">
      ${illus.svg.replace('<svg','<svg fill="var(--purple)"')}
      <div class="illus-name">${illus.lbl}</div>
    </div>
    <div class="form-block" id="fb"></div>
  `;
  phone.appendChild(cont);

  /* footer */
  const foot = el('div','footer');
  const btn  = el('button','btn-next');
  btn.id = 'bnext';
  btn.textContent = step === TOTAL ? 'Terminé !' : 'Suivant';
  btn.onclick = next;
  foot.appendChild(btn);

  const note = el('span','note-deco');
  note.textContent = '♩';
  foot.appendChild(note);

  if (step === 1) {
    const hint = el('div','login-hint');
    hint.innerHTML = `Tu n'as pas de compte ? <a href="#">Crée-en un !</a>`;
    foot.appendChild(hint);
  }
  phone.appendChild(foot);

  buildForm();
  refreshBtn();
}

function buildForm() {
  const fb = document.getElementById('fb');
  if (!fb) return;

  if (step===1) {
    fb.innerHTML = `<div class="q-label">Quel est ton <em>prénom</em> ?</div>
      <input type="text" placeholder="Prénom" value="${esc(state.prenom)}" id="i1" oninput="state.prenom=this.value;refreshBtn()">`;
  }
  else if (step===2) {
    fb.innerHTML = `<div class="q-label">Quel est ton <em>âge</em> ?</div>
      <input type="number" placeholder="Âge" min="5" max="99" value="${esc(state.age)}" id="i2" oninput="state.age=this.value;refreshBtn()">`;
  }
  else if (step===3) {
    const cards = INSTRUMENTS.map(ins=>`
      <div class="instr-card${state.instrument===ins.id?' sel':''}" onclick="pick('instrument','${ins.id}')">
        ${ins.svg.replace('<svg','<svg style="fill:inherit"')}
        <div class="lbl">${ins.lbl}</div>
      </div>`).join('');
    fb.innerHTML = `<div class="q-label" style="margin-bottom:12px">Quel <em>instrument</em> pratiques-tu ?</div>
      <div class="instr-grid">${cards}</div>`;
  }
  else if (step===4) {
    fb.innerHTML = `<div class="q-label">Depuis <em>combien de temps</em> tu pratiques cet instrument ?
        <span class="q-hint">(N'oublies pas de préciser si c'est en mois ou en années)</span></div>
      <input type="text" placeholder="Durée" value="${esc(state.duree)}" id="i4" oninput="state.duree=this.value;refreshBtn()">`;
  }
  else if (step===5) {
    fb.innerHTML = `<div class="q-label">Tu es dans quelle <em>école</em> ou <em>conservatoire</em> ?</div>
      <input type="text" placeholder="École" value="${esc(state.ecole)}" id="i5" oninput="state.ecole=this.value;refreshBtn()">`;
  }
  else if (step===6) {
    const cells = MASCOTTES.map(m=>`
      <div class="mascot-cell${state.mascotte===m?' sel':''}" onclick="pick('mascotte','${m}')">${m}</div>`).join('');
    fb.innerHTML = `<div class="q-label" style="margin-bottom:12px">Choisis une <em>mascotte</em> !</div>
      <div class="mascot-grid">${cells}</div>`;
  }
  else if (step===7) {
    const pills = JOURS.map(j=>`
      <button class="day-pill${state.jours.includes(j)?' sel':''}" onclick="toggleDay('${j}')">${j}</button>`).join('');
    fb.innerHTML = `<div class="q-label" style="margin-bottom:14px">Quels jours veux-tu <em>travailler</em> ?</div>
      <div class="days-row">${pills}</div>`;
  }
}

function pick(k,v){ state[k]=v; buildForm(); refreshBtn(); }
function toggleDay(j){
  const i=state.jours.indexOf(j);
  if(i===-1) state.jours.push(j); else state.jours.splice(i,1);
  buildForm(); refreshBtn();
}

function refreshBtn(){
  const btn=document.getElementById('bnext');
  if(!btn) return;
  const ok={
    1:()=>state.prenom.trim(),
    2:()=>state.age,
    3:()=>state.instrument,
    4:()=>state.duree.trim(),
    5:()=>state.ecole.trim(),
    6:()=>state.mascotte,
    7:()=>state.jours.length>0,
  };
  btn.disabled = !ok[step]?.();
}

function next(){ go(step<TOTAL?step+1:8); }
function go(n){ step=n; render(); }

function renderSuccess(phone){
  const instr = INSTRUMENTS.find(i=>i.id===state.instrument)?.lbl || 'ton instrument';
  phone.innerHTML = `
    <div class="success-body">
      <div class="s-mascot">${state.mascotte||'🎵'}</div>
      <div class="s-title">Bienvenue, ${esc(state.prenom)} !</div>
      <div class="s-msg">Ton compte est prêt.<br>Lance-toi et pratique <strong>${esc(instr)}</strong> chaque jour !</div>
    </div>
    <div class="footer">
      <button class="btn-next" onclick="alert('Redirection vers l\\'app...')">Commencer l'aventure 🚀</button>
      <span class="note-deco">♩</span>
    </div>`;
}

/* ── helpers ── */
function el(tag,cls){ const e=document.createElement(tag); e.className=cls; return e; }
function esc(s){ return String(s).replace(/"/g,'&quot;'); }

render();
</script>
</body>
</html>
